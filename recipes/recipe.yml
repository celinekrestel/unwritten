###################
##  DNF removals ##
###################

  - type: dnf
    repos:
      cleanup: true
    remove:
      packages:
        - gnome-tour
        - ibus-libpinyin
        - ibus-typing-booster
        - malcontent-control
        - yelp
        - yelp-libs
        - yelp-xsl 
         
#######################
##  GNOME extensions ##
#######################

  - type: gnome-extensions        
    install:
      # - 7065    # Tiling Shell:                                   https://extensions.gnome.org/extension/7065/tiling-shell/
      - 615       # AppIndicator and KStatusNotifierItem Support:   https://extensions.gnome.org/extension/615/appindicator-support/
      - 3843      # Just Perfection:                                https://extensions.gnome.org/extension/3843/just-perfection/
      - 5470      # Weather O’Clock:                                https://extensions.gnome.org/extension/5470/weather-oclock/
      # - 5506    # User Avatar In Quick Settings:                  https://extensions.gnome.org/extension/5506/user-avatar-in-quick-settings/
      # GSConnect, i.e. 1319 (installed as rpm, see above)          https://extensions.gnome.org/extension/1319/gsconnect/
      # Caffeine, i.e. 517 (installed as rpm, see above)            https://extensions.gnome.org/extension/517/caffeine/

###############
##  DeaDBeeF ##
###############

  # DeaDBeeF (make sure these are `the last` rpm packages to be installed):
  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
    install:
      packages:
        - deadbeef
        - deadbeef-plugins
        
  # Set DeaDBeeF to dark theme and delete mpris.so – mpris causes cursor micro stutters when switching tracks:
  - type: script
    scripts:
      - deadbeef.sh

###############
##  Stamp it ##
###############

  - type: os-release
    properties:
      ID: unwritten
      ID_LIKE: fedora
      NAME: Unwritten
      VERSION: "44"
      PRETTY_NAME: Unwritten 44
      DEFAULT_HOSTNAME: unwritten
      VERSION_CODENAME: Next

################################################
##  Remove Fedora Flatpak repo – add Flathub  ##
################################################

  - type: script 
    snippets:
      - mkdir -p /etc/flatpak/remotes.d/
      - curl --retry 3 -Lo /etc/flatpak/remotes.d/flathub.flatpakrepo https://dl.flathub.org/repo/flathub.flatpakrepo
      - rm -f /usr/lib/systemd/system/flatpak-add-fedora-repos.service

######################
##  Make it clean.  ##
######################
  - type: script
    snippets:
      - rm -rf /usr/share/doc
      - rm -rf /usr/src
      - rpm --erase --nodeps kernel-cachyos-devel || true
      - rpm --erase --nodeps kernel-cachyos-lts-devel || true
      - rm -f /tmp/ltsbuild
      - dnf5 versionlock clear
      - dnf5 clean all

#######################
##  Systemd services ##
#######################

  # Enable, disable and mask systemd services:
  - type: systemd
    system:
      enabled:
        - gdm.service
        - systemd-timesyncd.service
        - systemd-resolved.service
        - rechunker-group-fix.service
        - me.proton.vpn.split_tunneling.service
        - btrbk.timer
      disabled:
        - rpm-ostree-countme.timer
      masked:
        - bootc-fetch-apply-updates.timer
        - bootc-fetch-apply-updates.service
        - systemd-remount-fs.service
    # user:
    #  enabled:
        # - some_service.service

#######################
##  Kernel arguments ##
#######################

  # Set kernel arguments for disabling plymouth (since it is not part of Unwritten):
  - type: kargs
    kargs:
      - plymouth.enable=0
      - rd.plymouth=0
      - rd.info=1

  # Set kernel arguments for Varmilo keyboard, so you don’t have to press the `FN` key to get `F1`–`F12` working:
  - type: kargs
    kargs:
      - hid_apple.fnmode=2

################
##  Initramfs ##
################

  - type: initramfs


####################
##  Image signing ##
####################

 # Set up policy & signing files for your signed image:
  - type: signing 
  
