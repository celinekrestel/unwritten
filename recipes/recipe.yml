---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

##########################################
##########################################
##          ##################          ##
##          ## Unwritten 44 ##          ##
##          ##################          ##
##########################################
##########################################

#################################################
## Find a removal log at the end of this file. ##
#################################################

#########################################
## Image metadata & base configuration ##
#########################################

name: unwritten
description: Unwritten 44 
base-image: quay.io/fedora/fedora-bootc
image-version: 44
cosign-version: none                       # Container signing via cosign
nushell-version: none                      # BlueBuild scripting during the build process
blue-build-tag: none                       # BlueBuild won’t append its tags to this image

modules:
  - type: dnf
    install:
      packages:
        - fedora-logos                     # Provides base Fedora visual assets
        - dnf5-plugins                     # Essential plugins for DNF5 (needed for COPR)

  - type: files
    files:
      - source: system                     # Copies local ./system directory files over to /
        destination: /

######################################################
## Remove packages from the fedora-bootc base image ##
######################################################

  - type: dnf
    remove:
      packages:
        # - console-login-helper-messages
        - chrony                           # Replaced with systemd-timesyncd (see systemd section)
        - sssd* # Not needed if only local users are used
        - qemu-user-static*                # Not needed unless cross-arch dev is required
        - toolbox                          # Replaced by distrobox (see below)

  - type: script
    snippets:
      - rm -f /usr/bin/chsh /usr/bin/lchsh # Footgun. see https://github.com/ublue-os/main/issues/598

#######################################
## Media Repositories & Reprioritize ##
#######################################

  - type: script
    snippets:
      - dnf5 config-manager addrepo --from-repofile='https://negativo17.org/repos/fedora-multimedia.repo'
      - dnf5 config-manager setopt fedora-multimedia.priority=90
      - dnf5 config-manager setopt fedora-cisco-openh264.enabled=0
  
  - type: dnf
    install:
      skip-unavailable: true
      packages:
        - libheif                          # Support for Apple HEIC photo format
        - libva                            # Core library for hardware video acceleration (VA-API)
        - mesa-dri-drivers                 # OpenGL drivers
        - mesa-filesystem                  # Base directory structures for Mesa
        - mesa-libEGL                      # EGL API (Crucial for Wayland display servers)
        - mesa-libGL                       # Standard OpenGL library
        - mesa-libgbm                      # Generic Buffer Management (Crucial for Wayland compositing)
        - mesa-va-drivers                  # Unrestricted VA-API drivers for H.264/HEVC decoding
        - mesa-vulkan-drivers              # Vulkan drivers (RADV for AMD, ANV for Intel)
        - ocl-icd                          # OpenCL support for GPU compute tasks (Blender, etc.)

  - type: script
    snippets:
      - dnf5 versionlock add intel-gmmlib intel-mediasdk intel-vpl-gpu-rt libheif libva libva-intel-media-driver mesa-dri-drivers mesa-filesystem mesa-libEGL mesa-libGL mesa-libgbm mesa-va-drivers mesa-vulkan-drivers

##############################################
## Core Software, Utilities, and GNOME Base ##
##############################################

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/packages
    install:
      packages:
        ###################################
        ##  Hardware & System Sensors    ##
        ###################################
        - alsa-firmware                    # Firmware for Advanced Linux Sound Architecture
        - alsa-sof-firmware                # Sound Open Firmware. Crucial for modern Intel/AMD audio DSPs
        - alsa-tools-firmware              # Firmware loader tools for specific ALSA sound cards
        - evtest                           # Input device event monitor and query tool
        - hplip                            # HP Linux Imaging and Printing suite
        - inxi                             # Feature-rich command line system information script
        - libratbag-ratbagd                # Daemon for configuring programmable gaming mice
        - libsane-hpaio                    # HP network scanner support (part of HPLIP)
        - lshw                             # Detailed hardware lister utility
        - mangohud                         # Vulkan/OpenGL overlay for monitoring FPS and thermals
        - nvme-cli                         # Command-line tool for managing NVMe SSDs
        - nvtop                            # Task monitor specifically for GPUs (AMD, Intel, NVIDIA)
        - openrgb-udev-rules               # Hardware access rules for OpenRGB lighting control
        - powerstat                        # Tool to measure laptop power consumption
        - sane-backends-drivers-scanners   # Universal scanner drivers for Linux
        - smartmontools                    # S.M.A.R.T. disk health monitoring utilities
        - solaar-udev                      # Access rules for Solaar (Logitech receiver manager)

        ###################################
        ##  System Tools & Utilities     ##
        ###################################
        - atuin                            # Magical shell history synced across multiple devices
        - bc                               # Basic Calculator. CLI tool for mathematical processing
        - borgbackup                       # Deduplicating archiver with compression and encryption
        - btop                             # Beautiful terminal resource monitor (CPU, memory, disks)
        - btrbk                            # Tool for creating snapshots/backups of btrfs subvolumes
        - chezmoi                          # Secure dotfile manager for cross-machine sync
        - clamav                           # Open-source command-line antivirus engine
        - clamav-freshclam                 # Auto-updater for ClamAV virus signature databases
        - cups                             # Common UNIX Printing System, required for printing
        - distrobox                        # Run any Linux distribution inside your terminal
        - fedora-repos-archive             # Access to archived, older Fedora repositories
        - firewalld                        # Dynamic firewall management daemon
        - flatpak                          # Linux application sandboxing and distribution framework
        - flatpak-spawn                    # Run host commands from inside Flatpak sandboxes
        - fuse                             # Filesystem in Userspace (crucial for AppImages)
        - fuse-libs                        # Libraries for Filesystem in Userspace
        - fzf                              # Command-line fuzzy finder for fast terminal searches
        - git                              # Distributed version control system
        - gum                              # Tool for creating glamorous shell scripts
        - lynis                            # Security auditing tool for Unix-like systems
        - mbuffer                          # Tool for buffering data streams
        - micro                            # Modern and intuitive terminal-based text editor
        - openssl                          # Toolkit for TLS/SSL cryptographic protocols
        - pv                               # Pipe Viewer, monitors the progress of data in pipelines
        - symlinks                         # A tiny utility to find and fix broken symlinks
        - systemd-container                # Tools for managing local containers (machinectl)
        - systemd-oomd-defaults            # Out-of-memory daemon default configuration
        - tealdeer                         # Fast Rust implementation of tldr (simplified man pages)
        - unzip                            # Utility to extract zip archives
        - wget                             # Command-line utility for downloading files from the web
        - wl-clipboard                     # Command-line copy/paste utilities for Wayland
        - xwininfo                         # Window information utility for legacy X11 applications
        - zram-generator-defaults          # Config to auto-generate a compressed RAM disk (zram)
        - zstd                             # Zstandard fast real-time compression algorithm
        - zsh                              # The Z shell, a highly customizable bash alternative

        ###################################
        ##  Networking Tools             ##
        ###################################
        - gvfs-smb                         # Windows file sharing (SMB) network support for GNOME
        - NetworkManager-config-connectivity-fedora # NetworkManager connectivity checks for Fedora
        - NetworkManager-openvpn           # OpenVPN integration for NetworkManager
        - NetworkManager-wifi              # Core WiFi support for NetworkManager
        - wireguard-tools                  # Utilities for managing the WireGuard VPN protocol

        ###################################
        ##  Media & Codecs               ##
        ###################################
        - fdk-aac                          # High-quality AAC audio codec command line tools
        - heif-pixbuf-loader               # Allows GTK apps to natively render HEIF/HEIC images
        - libfdk-aac                       # Shared library for the FDK AAC codec
        - libva-utils                      # Collection of testing utilities for VA-API
        - pipewire-libs-extra              # Extra PipeWire libraries for advanced audio routing

        ###################################
        ##  GNOME Components             ##
        ###################################
        - f43-backgrounds-gnome            # Standard Fedora 43 desktop wallpapers
        - gdm                              # GNOME Display Manager (the login screen)
        - glycin-thumbnailer               # Sandboxed image thumbnailer used by modern GNOME apps
        - gnome-bluetooth                  # Bluetooth pairing and management tools for GNOME
        - gnome-color-manager              # Display color profile manager for GNOME
        - gnome-control-center             # GNOME's main unified settings interface
        - gnome-disk-utility               # Disks application for formatting and mounting drives
        - gnome-session-wayland-session    # Enables the Wayland session for GNOME
        - gnome-settings-daemon            # Background daemon handling GTK and session settings
        - gnome-shell                      # The core user interface of the GNOME desktop
        - gnome-shell-extension-caffeine   # Extension to keep the screen awake
        - gnome-shell-extension-gsconnect  # KDE Connect implementation for GNOME
        - gvfs-fuse                        # FUSE support for the GNOME Virtual File System
        - gvfs-mtp                         # Media Transfer Protocol support (mounts Android phones)
        - nautilus                         # GNOME's default file manager (Files)
        - orca                             # Screen reader for individuals who are visually impaired
        - ptyxis                           # Container-oriented terminal emulator for GNOME
        - xdg-desktop-portal-gnome         # GNOME backend for Flatpak file/screen-sharing portals
        - xdg-user-dirs-gtk                # Manages localized user directories (Documents, Downloads)

        ###################################
        ##  Fonts, Themes & L10N         ##
        ###################################
        - adw-gtk3-theme                   # Libadwaita styling for legacy GTK3 applications
        - fira-code-fonts                  # Monospace font with programming ligatures
        - glibc-langpack-de                # German language pack for GNU C Library
        - glibc-langpack-en                # English language pack for GNU C Library
        - glibc-langpack-fr                # French language pack for GNU C Library
        - google-noto-sans-balinese-fonts  # Font support for Balinese script
        - google-noto-sans-cjk-fonts       # Font support for Chinese, Japanese, and Korean
        - google-noto-sans-javanese-fonts  # Font support for Javanese script
        - google-noto-sans-sundanese-fonts # Font support for Sundanese script
        - ibm-plex-sans-fonts              # IBM's open-source corporate typeface
        - ibus                             # Intelligent Input Bus, for multilingual keyboard input
        - jetbrains-mono-fonts-all         # Excellent monospace font designed for developers

        ###################################
        ##  User Applications            ##
        ###################################
        - firefox                          # The Mozilla Firefox web browser

  - type: script
    scripts:
      - proton_vpn_app.sh
      - swap-kernel.sh
      - sudont.sh

