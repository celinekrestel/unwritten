#########################################
## Image metadata & base configuration ##
#########################################

name: unwritten
description: Unwritten 44 
base-image: quay.io/fedora/fedora-bootc
image-version: 44
cosign-version: none    # Container signing via cosign
nushell-version: none   # BlueBuild scripting during the build process
blue-build-tag: none    # BlueBuild won’t append its tags to this image

modules:
  # install fedora logos and dnf5-plugins that is needed for copr management and other actions
  - type: dnf
    install:
      packages:
        - fedora-logos
        - dnf5-plugins

  # copying system files over to the system
  - type: files
    files:
      - source: system
        destination: /

######################################################
## Remove packages from the fedora-bootc base image ##
######################################################
  - type: dnf
    remove:
      packages:
        # - console-login-helper-messages
        - chrony                           # replaced with systemd-timesyncd (see below)
        - sssd*                            # not needed if only local users are used
        - qemu-user-static*                # not needed unless cross-arch dev is required
        - toolbox                          # replaced by distrobox (see below)

  # footgun. see https://github.com/ublue-os/main/issues/598
  - type: script
    snippets:
      - rm -f /usr/bin/chsh /usr/bin/lchsh

  # add fedora-multimedia and disable openh264 repo
  - type: script
    snippets:
      - dnf5 config-manager addrepo --from-repofile='https://negativo17.org/repos/fedora-multimedia.repo'
      - dnf5 config-manager setopt fedora-multimedia.priority=90
      - dnf5 config-manager setopt fedora-cisco-openh264.enabled=0
  
  # install packages from fedora-multimedia
  - type: dnf
    install:
      skip-unavailable: true
      packages:
        - libheif             # Support for Apple HEIC photo format
        - libva               # Core library for hardware video acceleration (VA-API)
        - mesa-dri-drivers    # OpenGL drivers
        - mesa-filesystem     # Base directory structures for Mesa
        - mesa-libEGL         # EGL API (Crucial for Wayland)
        - mesa-libGL          # Standard OpenGL library
        - mesa-libgbm         # Generic Buffer Management (Crucial for Wayland compositing)
        - mesa-va-drivers     # Unrestricted VA-API drivers for H.264/HEVC hardware decoding
        - mesa-vulkan-drivers # Vulkan drivers (RADV for AMD, ANV for Intel)
        - ocl-icd             # OpenCL support for GPU compute tasks (heavy mathematical computer; Blender, etc.)

  # Hardware driver version locking:
  - type: script
    snippets:
      - dnf5 versionlock add intel-gmmlib intel-mediasdk intel-vpl-gpu-rt libheif libva libva-intel-media-driver mesa-dri-drivers mesa-filesystem mesa-libEGL mesa-libGL mesa-libgbm mesa-va-drivers mesa-vulkan-drivers

  # Install so called "batteries" coined by Universal Blue:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/packages
    install:
      packages:
        - alsa-firmware
        - distrobox
        - fdk-aac         # High-quality AAC audio codec (command line tool)
        - fedora-repos-archive
        - flatpak-spawn
        - fuse
        - fzf
        - google-noto-sans-balinese-fonts
        - google-noto-sans-cjk-fonts
        - google-noto-sans-javanese-fonts
        - google-noto-sans-sundanese-fonts
        - heif-pixbuf-loader
        - libfdk-aac
        - libheif
        - libratbag-ratbagd
        - libva-utils
        - lshw
        - nvme-cli
        - nvtop
        - openrgb-udev-rules
        - openssl
        - pipewire-libs-extra
        - powerstat
        - smartmontools
        - solaar-udev
        - symlinks        # A tiny utility to find and fix broken symlinks
        - wireguard-tools
        - wl-clipboard
        - zstd

  - type: script
    scripts:
      - proton_vpn_app.sh
      - swap-kernel.sh
      - sudont.sh

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/packages
    install:
      packages:
        - adw-gtk3-theme
        - alsa-sof-firmware    # Sound Open Firmware. Crucial for modern Intel/AMD audio DSPs to work properly
        - alsa-tools-firmware
        - atuin
        - bc                    # Basic Calculator. CLI tool for math.
        - borgbackup
        - btop
        - btrbk
        - chezmoi
        - clamav
        - clamav-freshclam
        - cups
        - evtest
        - f43-backgrounds-gnome
        - fira-code-fonts
        - firefox
        - firewalld
        - flatpak
        - fuse-libs
        - gdm
        - git
        - glibc-langpack-de
        - glibc-langpack-en
        - glibc-langpack-fr
        - glycin-thumbnailer
        - gnome-bluetooth
        - gnome-color-manager
        - gnome-control-center
        - gnome-disk-utility
        - gnome-session-wayland-session
        - gnome-settings-daemon
        - gnome-shell
        - gnome-shell-extension-caffeine
        - gnome-shell-extension-gsconnect
        - gum
        - gvfs-fuse
        - gvfs-mtp
        - gvfs-smb
        - hplip
        - ibm-plex-sans-fonts
        - ibus
        - inxi
        - jetbrains-mono-fonts-all  
        - libratbag-ratbagd
        - libsane-hpaio
        - lynis
        - mangohud
        - mbuffer
        - micro
        - nautilus
        - NetworkManager-config-connectivity-fedora
        - NetworkManager-openvpn
        - NetworkManager-wifi
        - orca
        - ptyxis
        - pv
        - sane-backends-drivers-scanners
        - systemd-container
        - systemd-oomd-defaults
        - tealdeer
        - unzip
        - wget
        - xdg-desktop-portal-gnome
        - xdg-user-dirs-gtk
        - xwininfo
        - zram-generator-defaults
        - zsh

